  <script>
    (function () {
      const WECHAT_ID = "tlx369tlx369";
      const toastMessage = document.getElementById("toast-message");
      let hideTimer;

      function legacyCopyText(text) {
        return new Promise(function (resolve, reject) {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand("copy") ? resolve() : reject();
          } catch (err) {
            reject(err);
          } finally {
            document.body.removeChild(textarea);
          }
        });
      }

      function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text).catch(function () {
            return legacyCopyText(text);
          });
        }
        return legacyCopyText(text);
      }

      function showToast(message) {
        clearTimeout(hideTimer);
        toastMessage.textContent = message;
        toastMessage.style.display = "block";
        hideTimer = setTimeout(function () {
          toastMessage.style.display = "none";
        }, 2400);
      }

      if (toastMessage) {
        document.addEventListener("click", function (event) {
          const copyTag = event.target.closest(".copy-tag, .js-copy-wechat");
          if (!copyTag) return;

          copyText(WECHAT_ID)
            .then(function () {
              showToast("✓ 复制微信号成功");
            })
            .catch(function () {
              showToast("复制失败，请手动复制微信号：" + WECHAT_ID);
            });
        });
      }

      const introPop = document.getElementById("intro-pop");
      if (introPop) {
        const hideIntro = function () {
          introPop.classList.add("intro-pop--hidden");
          setTimeout(function () {
            introPop.remove();
          }, 420);
        };

        introPop.addEventListener("click", hideIntro);
        setTimeout(hideIntro, 1600);
      }
    })();
  </script>
