<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thai Star 行程表 — 泰系爱豆活动与节目一览" />
  <title>Thai Star · 行程表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-blob bg-blob--mint" aria-hidden="true"></div>
  <div class="bg-blob bg-blob--pink" aria-hidden="true"></div>

  <header class="site-header">
    <div class="site-header__inner">
      <p class="site-header__eyebrow">✦ Schedule</p>
      <h1 class="site-header__title">
        <span class="site-header__title-th">Thai Star</span>
        <span class="site-header__title-zh">行程表</span>
      </h1>
      <p class="site-header__services">🔍 更多活动资讯 | 线下追星群组 | 票务周边 | 活动代排</p>
      <p class="site-header__wechat">
        专属追星管家，助你奔赴热爱！请加微信：<span id="wechat-id">tlx369tlx369</span><button
          type="button"
          class="copy-btn"
          aria-label="复制微信号 tlx369tlx369"
        >复制</button>
      </p>
    </div>
  </header>

  <div id="copy-toast" class="copy-toast" role="status" aria-live="polite" hidden>复制微信号成功</div>

  <main class="schedule" id="schedule" aria-live="polite">
    <!--
      由 app.js 动态渲染。
      带图卡片：.event-card--has-image → 左 .event-card__media(110×145) + 右 .event-card__body(flex 纵排)
      无图卡片：.event-card__body 自动 flex:1 撑满全宽
    -->
    <p class="schedule-status" id="schedule-status">
      <span class="schedule-status__spinner" aria-hidden="true"></span>
      正在从 Google 表格加载行程…
    </p>
  </main>

  <footer class="site-footer">
    <p id="footer-text">数据同步自 Google 表格 · Thai Star Schedule</p>
  </footer>

  <script src="app.js" defer></script>
  <script>
    (function () {
      const WECHAT_ID = "tlx369tlx369";
      const copyBtn = document.querySelector(".copy-btn");
      const toast = document.getElementById("copy-toast");
      let toastTimer;

      function showToast() {
        if (!toast) return;
        clearTimeout(toastTimer);
        toast.hidden = false;
        toast.classList.add("copy-toast--visible");
        toastTimer = setTimeout(function () {
          toast.classList.remove("copy-toast--visible");
          toastTimer = setTimeout(function () {
            toast.hidden = true;
          }, 280);
        }, 2200);
      }

      function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand("copy") ? resolve() : reject();
          } catch (err) {
            reject(err);
          } finally {
            document.body.removeChild(textarea);
          }
        });
      }

      if (copyBtn) {
        copyBtn.addEventListener("click", function () {
          copyText(WECHAT_ID)
            .then(showToast)
            .catch(function () {
              window.alert("复制失败，请手动选择微信号复制");
            });
        });
      }
    })();
  </script>
</body>
</html>
